version: '3.8'

services:
  frontend:
    build: ./frontend
    working_dir: /var/www/html/aivideo/frontend
    volumes:
      - ./frontend:/var/www/html/aivideo/frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html/aivideo/backend
    environment:
      - APP_ENV=${APP_ENV}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html/aivideo/backend
      - ./video-engine:/var/www/html/aivideo/video-engine
    environment:
      - APP_ENV=${APP_ENV}
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
      - VIDEO_ENGINE_PATH=/var/www/html/aivideo/video-engine/remotion-pro
      - FFMPEG_PATH=/var/www/html/aivideo/video-engine/tools/ffmpeg-8.1.1-essentials_build/bin/ffmpeg
      - LARAVEL_STORAGE_PUBLIC=/var/www/html/aivideo/backend/storage/app/public
      - SADTALKER_SPACE=${SADTALKER_SPACE:-vinthony/SadTalker}
      - PIPER_VOICE_PATH=${PIPER_VOICE_PATH}
      - PIPER_CMD=${PIPER_CMD:-python3 -m piper}
    depends_on:
      - db
      - redis
      - backend
    command: php artisan queue:work redis --tries=1 --timeout=900

volumes:
  db_data:
