version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/var/www/html/aivideo/frontend
      - ./backend:/var/www/html/aivideo/backend
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    working_dir: /var/www/html/aivideo/frontend  # Your preferred working directory
    volumes:
      - ./frontend:/var/www/html/aivideo/frontend  # Mount frontend directory accordingly
    environment:
      - NEXT_PUBLIC_API_URL=http://backend.mycellstuff.com/api  # Subdomain for backend API
    command: ["npm", "run", "dev"]  # Runs the Next.js dev server


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html/aivideo/backend
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      - db
      - redis
    command: php artisan serve --host=0.0.0.0 --port=8000  # Runs Laravel's built-in server

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
