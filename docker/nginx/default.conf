server {
    listen 80;
    server_name frontend.mycellstuff.com;

    location / {
        proxy_pass http://frontend:3000;  # Assuming the frontend is running on port 3000 within the Docker container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name backend.mycellstuff.com;

    location / {
        proxy_pass http://backend:8000;  # Assuming the backend is running on port 8000 within the Docker container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

